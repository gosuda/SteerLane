services:
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: steerlane
      POSTGRES_USER: steerlane
      POSTGRES_PASSWORD: steerlane
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steerlane"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      STEERLANE_MODE: selfhosted
      STEERLANE_HTTP_ADDR: ":8080"
      STEERLANE_PUBLIC_BASE_URL: "http://localhost:8080"
      STEERLANE_POSTGRES_DSN: "postgres://steerlane:steerlane@postgres:5432/steerlane?sslmode=disable"
      STEERLANE_REDIS_ADDR: "redis:6379"
      STEERLANE_JWT_SECRET: "dev-secret-change-me"
      STEERLANE_CORS_ORIGINS: "http://localhost:5173"
    healthcheck:
      test: ["CMD-SHELL", "ps -p 1 | grep -q steerlane"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
